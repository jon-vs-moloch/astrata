<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrata Desktop</title>
    <style>
      :root {
        --bg: #0f0d0b;
        --panel: rgba(255, 248, 239, 0.08);
        --ink: #f7efe3;
        --muted: #c7b9a5;
        --accent: #d16a41;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(209, 106, 65, 0.24), transparent 30%),
          linear-gradient(180deg, #191511 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      }
      .panel {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(255,255,255,0.08);
        background: var(--panel);
        backdrop-filter: blur(16px);
      }
      h1 {
        margin: 0 0 8px;
        font-family: "Iowan Old Style", "Georgia", serif;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 0.96;
      }
      p { color: var(--muted); line-height: 1.5; }
      .status { margin-top: 16px; color: var(--accent); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="panel">
      <p>Astrata Desktop</p>
      <h1>Launching your local operator surface.</h1>
      <p>
        The native shell is starting Astrata's owned local runtime and then handing off
        to the same local web surface used by the rest of the system.
      </p>
      <div class="status">Waiting for backend...</div>
    </div>
  </body>
  </html>
